name: Continuous Integration

on:
  pull_request:
    branches:
      - v1
  push:
    branches:
      - v1

permissions:
  contents: read

jobs:
  test-typescript:
    name: TypeScript Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        id: setup-node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - name: Install Dependencies
        id: npm-ci
        run: npm install

      - name: Check Format
        id: npm-format-check
        run: npm run format:check

      - name: Lint
        id: npm-lint
        run: npm run lint

      - name: Test
        id: npm-ci-test
        run: npm run ci-test

  test-action:
    strategy:
      matrix:
        include:
          - target: '(linux-*|windows-*)-(gnu*|none)' # zig
            name: 'zig'
          - target: 'darwin-*' # apple
            name: 'osxcross'
          - target: 'linux-*-musl*' #musl
            name: 'musl'
          - target: 'windows-arm64' #win-arm64
            name: 'win-arm64'
          - target: 'android-*' #android
            name: 'android'
          - target: 'freebsd-*' #freebsd
            name: 'freebsd'
          - target: 'windows7-*' #windows7
            name: 'windows7'
    name: GitHub Actions Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.3'

      - name: Setup Zig
        uses: mlugg/setup-zig@v2

      - name: Test Local Action
        id: test-action
        uses: ./
        with:
          dir: './example'
          targets: ${{ matrix.target }}
          musl-target-format: $os-$musl-$arch
          x-flags: |
            main.owner=$owner
            main.repo=$repo
            main.target=$target
            main.sha=$sha
            main.short_sha=$short_sha
            main.pr=$pr
            main.ext=$ext
            main.tag=$tag
            main.hostname=$hostname
            main.username=$username
            main.built_on=$built_on
            main.built_at=$built_at
            main.git_author=$git_author
            main.git_commit=$git_commit
            main.go_version=$go_version

      - name: Print Output
        id: output
        run: |
          echo "${{ steps.test-action.outputs.files }}"
          echo "--------------------------------"
          ls -lh bin/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}_${{ github.sha }}
          path: bin/
