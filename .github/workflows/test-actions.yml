name: Test Actions

on:
  pull_request:
    branches:
      - v1
  push:
    branches:
      - v1
  workflow_dispatch:

concurrency:
  group:
    ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-action:
    strategy:
      matrix:
        targets:
          - '!(*musl*|*windows-arm64*|*android*|*freebsd*)' # xgo
          - 'linux-*-musl*' #musl
          - 'windows-arm64' #win-arm64
          - 'android-*' #android
          - 'freebsd-*' #freebsd
    name: GitHub Actions Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Test Local Action
        id: test-action
        uses: ./
        with:
          dir: './example'
          targets: ${{ matrix.targets }}
          musl-target-format: $os-$musl-$arch
          x-flags: |
            main.owner=$owner
            main.repo=$repo
            main.target=$target
            main.sha=$sha
            main.short_sha=$short_sha
            main.pr=$pr
            main.ext=$ext
            main.tag=$tag
            main.hostname=$hostname
            main.username=$username
            main.built_on=$built_on
            main.built_at=$built_at
            main.git_author=$git_author
            main.git_commit=$git_commit
            main.go_version=$go_version

      - name: Print Output
        id: output
        run: echo "${{ steps.test-action.outputs.files }}"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.sha }}
          path: bin/